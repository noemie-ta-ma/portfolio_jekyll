<section
  class="hero is-fullheight has-text-centered"
  id="hero"
  style="background-image: url('{{ site.heroimage | relative_url }}'); background-size: cover; background-position: center;"
>
  <div class="hero-body">
    <div class="container">
      <h1 class="title has-text-white is-size-1 is-uppercase has-text-weight-bold">
        {{ site.title }}
      </h1>
      <h3 class="subtitle has-text-white-bis is-uppercase has-text-weight-medium is-marginless">
        {{ site.description }}
      </h3>
      <hr>
      <a href="{{ '/#about' | relative_url }}"
         class="button is-white is-rounded is-outlined is-uppercase has-text-weight-normal">
        Découvrir
      </a>
    </div>
  </div>
</section>
