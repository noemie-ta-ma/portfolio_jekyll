---
layout: compress
---
<!DOCTYPE html>
<html lang="fr">
{% include head.html %}
<body>
    {% include navbar.html %}

    <section class="section pt-6 mt-6" id="cv">
        <div class="container is-max-desktop section-cv-content"> 
            
            <div class="has-text-centered mb-6">
                <figure class="image is-128x128 is-inline-block">
                    <img class="is-rounded" src="{{ '/assets/images/noemie-tasca.jpg' | relative_url }}" alt="Noémie Tasca">
                </figure>
                <h1 class="title is-1 mt-4">Noémie Tasca</h1>
                <p class="subtitle is-3 has-text-grey has-text-centered mt-4">Développeuse Web Junior</p>
            </div>

            <div class="box has-background-light has-text-centered">
                <div class="columns is-mobile is-multiline is-centered">
                    <div class="column is-narrow">
                        <i class="fas fa-envelope"></i> {{ site.email }}
                    </div>
                    <div class="column is-narrow">
                        <i class="fas fa-phone"></i> 07 62 24 32 67
                    </div>
                    <div class="column is-narrow">
                        <i class="fas fa-map-marker-alt"></i> Lille
                    </div>
                    <div class="column is-narrow">
                        <i class="fas fa-car"></i> Permis B
                    </div>
                </div>
                <div class="mt-3">
                    <a href="{{ '/assets/cv-noemie-tasca.pdf' | relative_url }}" class="button is-black is-rounded" target="_blank">
                        <i class="fas fa-file-pdf"></i> &nbsp; Télécharger mon CV en PDF
                    </a>
                </div>
            </div>

            <div class="content mt-6">
                {{ content }}
            </div>

        </div>
    </section>

    {% include footer.html %}
</body>
</html>
